name: Dashboard Managed Scan

on:
  workflow_dispatch:
    inputs:
      scan_type:
        description: Scan profile requested by the quality dashboard
        required: true
        default: full
        type: choice
        options:
          - full
          - pdp-cart
          - revenue
          - lighthouse
          - seo
          - accessibility
          - performance
          - smoke
          - regression

concurrency:
  group: dashboard-scan
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  scan-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      BASE_URL: https://www.sportstech.de/
      PAYMENT_MODE: boundary
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - id: checkout
        uses: actions/checkout@v4
      - id: setup_node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - id: npm_ci
        name: Install dependencies
        run: npm ci
      - id: playwright
        name: Install browser runtime
        run: npx playwright install --with-deps

      - id: scan
        name: Execute selected profile
        shell: bash
        run: |
          set +e
          case "${{ inputs.scan_type }}" in
            full) npm run validate:chromium ;;
            pdp-cart) npm run test:pdp-cart:fast ;;
            revenue) npm run revenue:full ;;
            lighthouse) npm run lighthouse ;;
            seo) npm run test:seo ;;
            accessibility) npm run test:a11y ;;
            performance) npm run test:performance ;;
            smoke) npm run test:smoke ;;
            regression) BROWSERS=chromium playwright test tests/regression ;;
          esac
          scan_code=$?
          npm run report:suites || true
          npm run revenue:report || true
          echo "SCAN_EXIT_CODE=$scan_code" >> "$GITHUB_ENV"
          exit 0

      - id: upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-latest-reports
          path: |
            reports
            test-results
          retention-days: 90

      - id: vercel_cli
        name: Install Vercel CLI
        run: npm install --global vercel@latest

      - id: publish
        name: Publish refreshed dashboard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Execution summary
        if: always()
        env:
          # Booleans only — secret *values* are never exposed.
          HAS_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
          HAS_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
          HAS_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}
          HAS_VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID != '' }}
          HAS_VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID != '' }}
        run: |
          {
            echo "## Dashboard scan"
            echo ""
            echo "- Profile: \`${{ inputs.scan_type }}\`"
            echo "- Scan automation exit code: \`${SCAN_EXIT_CODE:-unknown}\` (non-zero = validation found defects; this does NOT fail the job)"
            echo ""
            echo "### Step outcomes (the culprit is whichever shows \`failure\`)"
            echo ""
            echo "| Step | Outcome |"
            echo "| --- | --- |"
            echo "| Checkout | \`${{ steps.checkout.outcome }}\` |"
            echo "| Setup Node | \`${{ steps.setup_node.outcome }}\` |"
            echo "| Install dependencies (npm ci) | \`${{ steps.npm_ci.outcome }}\` |"
            echo "| Install browser runtime | \`${{ steps.playwright.outcome }}\` |"
            echo "| Execute selected profile | \`${{ steps.scan.outcome }}\` |"
            echo "| Upload artifacts | \`${{ steps.upload.outcome }}\` |"
            echo "| Install Vercel CLI | \`${{ steps.vercel_cli.outcome }}\` |"
            echo "| Publish refreshed dashboard | \`${{ steps.publish.outcome }}\` |"
            echo ""
            echo "### Secret presence (a missing secret is the usual cause of a Publish failure)"
            echo ""
            echo "| Secret | Present |"
            echo "| --- | --- |"
            echo "| ANTHROPIC_API_KEY | \`${HAS_ANTHROPIC_KEY}\` |"
            echo "| OPENAI_API_KEY | \`${HAS_OPENAI_KEY}\` |"
            echo "| VERCEL_TOKEN | \`${HAS_VERCEL_TOKEN}\` |"
            echo "| VERCEL_ORG_ID | \`${HAS_VERCEL_ORG_ID}\` |"
            echo "| VERCEL_PROJECT_ID | \`${HAS_VERCEL_PROJECT_ID}\` |"
            echo ""
            echo "_Reports are preserved and uploaded even when validation finds defects._"
          } >> "$GITHUB_STEP_SUMMARY"
